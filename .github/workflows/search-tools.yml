# Daily search for new legal tools (Reddit, directories)
# Outputs to docs/tools/TOOL-DISCOVERIES.md for manual review
name: Search Tools (Daily)

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tool search
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: python scripts/search-tools.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/tools/TOOL-DISCOVERIES.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: tool discoveries (daily search)"
            git push
          fi
