# Hourly sync: search for new information, update README and agent-index
name: Sync Tools (Hourly)

on:
  schedule:
    # Every hour at minute 0
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync script
        run: python scripts/sync-tools.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/agent-index.json README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: sync tools (hourly) - update last synced timestamp"
            git push
          fi
