# Weekly crawl: discover 200+ legal APIs via OpenAI; update legal-apis-index.json and MongoDB
name: Crawl Legal APIs (Weekly)

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawl
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scripts/crawl-datarade-legal-apis.py

      - name: Run seed
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        run: python scripts/seed-tools.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/tools/legal-apis-index.json docs/agent-index.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: weekly crawl - legal APIs index ($(date +%Y-%m-%d))"
            git push
          fi
